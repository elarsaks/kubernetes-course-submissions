name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    # Only create a release when a pull request is merged into master.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract exercise version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Find the first course exercise number in the PR title, such as 1.1 or 1.4.
          version="$(printf '%s\n' "$PR_TITLE" | grep -Eo '[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [ -z "$version" ]; then
            echo "::error::Could not extract an exercise number like 1.1 from PR title: $PR_TITLE"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: Exercise ${{ steps.version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          generate_release_notes: true
