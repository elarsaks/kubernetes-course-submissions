name: Exercise Release

on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Exercise version to publish, such as 1.9.
        required: true
        type: string
      ref:
        description: Commit, branch, or tag to publish.
        required: true
        default: master
        type: string

permissions:
  contents: write

jobs:
  release:
    # Publish exercise release refs automatically after exercise PR merges, or manually through workflow_dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract exercise version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$DISPATCH_VERSION" ]; then
            version="$DISPATCH_VERSION"
          else
            # Release only when the PR title starts with an exercise number.
            # Accept titles like "1.9 Add ping pong", "1.9.0 Add ping pong",
            # or "Exercise 1.9: Add ping pong", and publish branch/tag "1.9".
            version="$(printf '%s\n' "$PR_TITLE" | sed -nE 's/^(Exercise[[:space:]]+)?([0-9]+\.[0-9]+)(\.[0-9]+)?([[:space:]:-].*)?$/\2/p' | head -n 1)"
          fi

          if [ -z "$version" ]; then
            if [ -n "$DISPATCH_VERSION" ]; then
              echo "::error::Manual releases require an exercise version like 1.9"
              exit 1
            fi

            echo "::notice::No exercise version at the start of PR title; skipping release publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid exercise version: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Checkout release commit
        if: steps.version.outputs.should_publish == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Publish exercise release branch and tag
        if: steps.version.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag --force "$VERSION" HEAD
          git push --force-with-lease origin HEAD:refs/heads/"$VERSION"
          git push --force-with-lease origin refs/tags/"$VERSION":refs/tags/"$VERSION"

      - name: Publish GitHub release
        if: steps.version.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          title="Exercise $VERSION"
          notes="DevOps with Kubernetes exercise $VERSION submission."

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" --title "$title" --notes "$notes"
          else
            gh release create "$VERSION" --title "$title" --notes "$notes"
          fi
