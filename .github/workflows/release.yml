name: Exercise Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    # Only publish an exercise release branch when a pull request is merged into master.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Extract exercise version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Find the first course exercise number in the PR title, such as 1.1 or 1.4.
          version="$(printf '%s\n' "$PR_TITLE" | grep -Eo '[0-9]+\.[0-9]+' | head -n 1 || true)"

          if [ -z "$version" ]; then
            echo "::error::Could not extract an exercise number like 1.1 from PR title: $PR_TITLE"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish exercise release branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git push --force-with-lease origin HEAD:refs/heads/"$VERSION"
