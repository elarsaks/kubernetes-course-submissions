apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-data
          emptyDir: {}
      containers:
        - name: log-writer
          image: elarsaks/log-output:1.11.0
          imagePullPolicy: IfNotPresent
          command: ["node", "writer.js"]
          volumeMounts:
            - name: shared-data
              mountPath: /usr/src/app/files
        - name: log-server
          image: elarsaks/log-output:1.11.0
          imagePullPolicy: IfNotPresent
          command: ["node", "server.js"]
          env:
            - name: PORT
              value: "3000"
            - name: PING_PONG_URL
              value: "http://ping-pong:3000/pingpong"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-data
              mountPath: /usr/src/app/files
---
apiVersion: v1
kind: Service
metadata:
  name: log-output
spec:
  type: ClusterIP
  selector:
    app: log-output
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: log-output
spec:
  rules:
    - http:
        paths:
          - path: /pingpong
            pathType: Prefix
            backend:
              service:
                name: ping-pong
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: log-output
                port:
                  number: 3000
