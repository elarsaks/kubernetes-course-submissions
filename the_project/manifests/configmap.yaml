apiVersion: v1
kind: ConfigMap
metadata:
  name: project-config
  namespace: project
data:
  NODE_ENV: production
  PORT: "3000"
  IMAGE_PATH: /usr/src/app/files/image.jpg
  IMAGE_URL: https://picsum.photos/1200
  TODO_BACKEND_URL: http://todo-backend:3000/todos
  WIKIPEDIA_RANDOM_URL: https://en.wikipedia.org/wiki/Special:Random
  MAX_WIKIPEDIA_REDIRECT_ATTEMPTS: "5"
  POSTGRES_HOST: todo-postgres
  POSTGRES_PORT: "5432"
  CACHE_DURATION_MS: "600000"
  MAX_IMAGE_REDIRECTS: "5"
  MAX_TODO_LENGTH: "140"
