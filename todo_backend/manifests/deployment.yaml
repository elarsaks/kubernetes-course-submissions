apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:18.0
          command:
            - sh
            - -c
            - until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
          envFrom:
            - configMapRef:
                name: project-config
            - secretRef:
                name: todo-postgres-secret
      containers:
        - name: todo-backend
          image: elarsaks/todo-backend:2.10.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: project-config
            - secretRef:
                name: todo-postgres-secret
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend
  namespace: project
spec:
  type: ClusterIP
  selector:
    app: todo-backend
  ports:
    - port: 3000
      targetPort: 3000
